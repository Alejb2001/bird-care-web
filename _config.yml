title: Entre Alas
description: Tu fuente confiable de información para el bienestar y cuidado de aves mascota.
url: "https://alejb2001.github.io"
baseurl: "/bird-care-web"
author: Entre Alas
lang: es
email: ""

# Configuración de construcción
markdown: kramdown
highlighter: rouge
permalink: /articulos/:year/:month/:day/:title/

kramdown:
  input: GFM
  hard_wrap: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Feed RSS
feed:
  path: feed.xml

# Colecciones
collections:
  species:
    output: false

# Valores por defecto para posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Entre Alas

# Excluir del sitio generado
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .git
  - .bundle
  - COMO-PUBLICAR.md
  - _plantilla-articulo.md
  - node_modules
