---
layout: default
---

<div class="min-h-screen bg-gray-50">

  <!-- Header de página -->
  <div class="bg-nature-green-dark text-white py-16">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">{{ page.title }}</h1>
      {% if page.description %}
      <p class="text-xl text-white/90 max-w-2xl mx-auto">{{ page.description }}</p>
      {% endif %}
    </div>
  </div>

  <!-- Contenido -->
  <div class="max-w-4xl mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12">
      <div class="prose prose-lg max-w-none article-content">
        {{ content }}
      </div>
    </div>

    <div class="text-center mt-10">
      <a href="{{ '/' | relative_url }}" class="inline-flex items-center bg-nature-green-dark text-white px-8 py-4 rounded-full font-semibold hover:bg-nature-green shadow-lg transition-all">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Volver al inicio
      </a>
    </div>
  </div>

</div>
